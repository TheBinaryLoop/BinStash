# Disposable PostgreSQL for a local BinStash dev instance.
# Everything lives under the `binstash-dev` project name and a single named
# volume, so `docker compose -f tooling/dev-instance/compose.yaml down -v` removes all data.
name: binstash-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: binstash-dev-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
